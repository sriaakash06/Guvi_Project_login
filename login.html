<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/auth.css">
    <title>3D Authentication | Guvi Project</title>
</head>
<body class="dark-mode">
    <canvas id="background"></canvas>
    
    <div class="theme-switch" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
        <span id="theme-icon">🌙</span>
    </div>

    <div class="container">
        <div id="auth-alert"></div>
        
        <div class="form-container" id="form-container">
            <h2 id="form-title">Login</h2>
            <form id="auth-form">
                <!-- Inputs generated by JS -->
                <div id="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" id="submit-btn">Continue</button>
                <div class="toggle-btn" id="toggle-link" onclick="toggleForm()">Don't have an account? Register</div>
            </form>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. --- THREE.JS BACKGROUND ---
        const canvas = document.getElementById("background");
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.SphereGeometry(0.1, 8, 8);
        const material = new THREE.MeshStandardMaterial({ color: 0x7f00ff, emissive: 0x7f00ff, emissiveIntensity: 0.5 });
        const particles = [];

        for (let i = 0; i < 300; i++) {
            const particle = new THREE.Mesh(geometry, material);
            particle.position.set(
                (Math.random() - 0.5) * 60,  
                (Math.random() - 0.5) * 60,
                (Math.random() - 0.5) * 60
            );
            scene.add(particle);
            particles.push(particle);
        }

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pointLight = new THREE.PointLight(0x7f00ff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        camera.position.z = 25; 

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            particles.forEach((p, i) => {
                p.position.y += Math.sin(Date.now() * 0.001 + i) * 0.01;
                p.position.x += Math.cos(Date.now() * 0.001 + i) * 0.01;
            });
            camera.position.x += (mouseX * 5 - camera.position.x) * 0.02;
            camera.position.y += (mouseY * 5 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 2. --- AUTH LOGIC ---
        let isRegisterMode = false;

        function toggleForm() {
            const container = $('#form-container');
            container.addClass('fade-out');
            
            setTimeout(() => {
                isRegisterMode = !isRegisterMode;
                $('#auth-alert').html('');
                if (isRegisterMode) {
                    $('#form-title').text('Register');
                    $('#input-group').html(`
                        <input type="text" id="name" placeholder="Full Name" required>
                        <input type="email" id="email" placeholder="Email Address" required>
                        <input type="password" id="password" placeholder="Password" required>
                    `);
                    $('#toggle-link').text('Already have an account? Login');
                    $('#submit-btn').text('Create Account');
                } else {
                    $('#form-title').text('Login');
                    $('#input-group').html(`
                        <input type="email" id="email" placeholder="Email Address" required>
                        <input type="password" id="password" placeholder="Password" required>
                    `);
                    $('#toggle-link').text("Don't have an account? Register");
                    $('#submit-btn').text('Continue');
                }
                container.removeClass('fade-out');
            }, 400);
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.classList.contains('dark-mode')) {
                body.classList.replace('dark-mode', 'light-mode');
                icon.innerText = '☀️';
            } else {
                body.classList.replace('light-mode', 'dark-mode');
                icon.innerText = '🌙';
            }
        }

        // AJAX SUBMISSION
        $('#auth-form').on('submit', function(e) {
            e.preventDefault();
            const $btn = $('#submit-btn');
            const originalText = $btn.text();
            $btn.prop('disabled', true).text('Processing...');
            
            const url = isRegisterMode ? 'php/register.php' : 'php/login.php';
            const data = {
                email: $('#email').val(),
                password: $('#password').val()
            };
            if (isRegisterMode) data.name = $('#name').val();
            else data.action = 'login';

            $.ajax({
                url: url,
                type: 'POST',
                data: data,
                dataType: 'json',
                success: function(res) {
                    if (res.status === 'success') {
                        $('#auth-alert').html(`<div class="alert alert-success">${res.message || 'Success! Redirecting...'}</div>`);
                        if (!isRegisterMode) {
                            localStorage.setItem('session_token', res.token);
                            localStorage.setItem('user_email', res.email);
                        }
                        setTimeout(() => {
                            window.location.href = isRegisterMode ? 'login.html' : 'profile.html';
                            if (isRegisterMode) location.reload(); // Refresh to switch to login
                        }, 1500);
                    } else {
                        $('#auth-alert').html(`<div class="alert alert-danger">${res.message}</div>`);
                        $btn.prop('disabled', false).text(originalText);
                    }
                },
                error: function(xhr, status, error) {
                    console.error("AJAX Error Status:", status);
                    console.error("Error Message:", error);
                    console.error("Server Response:", xhr.responseText);
                    
                    let msg = "Server connection error.";
                    if (xhr.status === 404) msg = "Error: PHP file not found (404).";
                    else if (xhr.status === 500) msg = "Error: Internal Server Error (500). Please check PHP logs.";
                    else if (status === 'parsererror') msg = "Error: Invalid JSON response from server.";
                    
                    $('#auth-alert').html(`<div class="alert alert-danger">${msg}</div>`);
                    $btn.prop('disabled', false).text(originalText);
                }

            });
        });

        // check if already logged in
        if (!isRegisterMode && localStorage.getItem('session_token')) {
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
